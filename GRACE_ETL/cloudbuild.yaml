steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - '-c'
      - 'docker pull gcr.io/$PROJECT_ID/asu-awo-grace-etl:latest || exit 0'
    entrypoint: bash
  - name: gcr.io/cloud-builders/docker
    env:
    - DOCKER_BUILDKIT=1
    args:
      - build
      - '-t'
      - 'gcr.io/$PROJECT_ID/asu-awo-grace-etl:latest'
      - '--cache-from'
      - 'gcr.io/$PROJECT_ID/asu-awo-grace-etl:latest'
      - '-f'
      - GRACE_ETL/Dockerfile
      - GRACE_ETL
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - 'gcr.io/$PROJECT_ID/asu-awo-grace-etl:latest'
    id: Push
images:
  - 'gcr.io/$PROJECT_ID/asu-awo-grace-etl:latest'
options:
  logging: CLOUD_LOGGING_ONLY
